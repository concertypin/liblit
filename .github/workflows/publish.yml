name: Publish

on:
  release:
    types: [published]
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # required for npm provenance (OIDC trusted publishing)

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.repository == 'concertypin/liblit'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: ./package.json

      - uses: actions/setup-node@v4
        with:
          node-version-file: ./package.json
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint:check
        name: Lint

      - run: pnpm test
        name: Test

      - run: pnpm build
        name: Build

      - run: pnpm publish --provenance --no-git-checks
        name: Publish to npm
        env:
          # OIDC trusted publishing: no NODE_AUTH_TOKEN needed.
          # Requires npm registry to trust ghcr.io/concertypin/liblit.
          # See: https://docs.npmjs.com/generating-provenance-statements
          NODE_AUTH_TOKEN: ""
